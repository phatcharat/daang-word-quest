<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>Daang Word Quest</title>

    <link rel="stylesheet" href="../../styles/reset.css">
    <link rel="stylesheet" href="../../styles/variables.css">
    <link rel="stylesheet" href="../../styles/global.css">

    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="../shared/bottom-nav.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="home-page">

    <!-- Header -->
    <header class="home-header page-header">
        <div class="logo-section">
            <div class="logo-wrapper">
                <img
                    src="../../assets/images/DaangLogo.png"
                    alt="DaangQuest">
            </div>
        </div>

        <div class="user-stats">
            <div class="stat fire">
                🔥 1 วัน
            </div>

            <div class="stat xp">
                ⚡ 1000 XP
            </div>
        </div>
    </header>

    <!-- Welcome -->
    <section class="welcome-section">
        <h1>Hello, User 👋🏻</h1>
        <p>Glad you're back, Let's keep training! 🌟</p>
    </section>

    <!-- Menu Cards -->
    <section class="menu-list">

        <div class="menu-card" id="spell-btn">
            <div class="icon-box">
                <i class="fa-solid fa-pen"></i>
            </div>

            <div class="menu-content">
                <h3>สะกดคำ</h3>
                <p>พิมพ์คำตอบจากความหมายที่เห็น</p>
            </div>
        </div>

        <div class="menu-card" id="quiz-btn">
            <div class="icon-box">
                <i class="fa-solid fa-list-check"></i>
            </div>

            <div class="menu-content">
                <h3>Quiz 4 ตัวเลือก</h3>
                <p>เลือกคำตอบที่ถูกต้อง</p>
            </div>
        </div>

    </section>

    <!-- Bottom Nav -->
    <div class="bottom-nav">

        <button class="nav-item" onclick="navigateTo('leaderboard')">
            <i class="fas fa-trophy"></i>
        </button>

        <button class="nav-item active" onclick="navigateTo('home')">
            <i class="fas fa-home"></i>
        </button>

        <button class="nav-item" onclick="navigateTo('profile')">
            <i class="fas fa-user"></i>
        </button>

    </div>

</div>

<script src="home.js"></script>

</body>
</html>
