<div class="spelling-page">

    <header class="spelling-header">

        <div class="page-title">
            <div class="title-icon">
                <i class="fa-solid fa-pen"></i>
            </div>

            <h1>สะกดคำ</h1>
        </div>

        <div class="user-stats">
            <div class="stat fire">🔥 1 วัน</div>
            <div class="stat xp">⚡ 1000 XP</div>
        </div>

    </header>

    <section class="category-list">

        <button class="category-card" data-category="objects">
            <div class="category-content">
                <h3>สิ่งของ/เครื่องใช้</h3>
                <p>คำศัพท์เกี่ยวกับสิ่งของในชีวิตประจำวัน</p>
            </div>

            <div class="category-icon orange">
                <i class="fa-solid fa-bag-shopping"></i>
            </div>
        </button>

        <button class="category-card" data-category="animals">
            <div class="category-content">
                <h3>สัตว์/สิ่งมีชีวิต</h3>
                <p>เรียนรู้ชื่อสัตว์และสิ่งมีชีวิต</p>
            </div>

            <div class="category-icon blue">
                <i class="fa-solid fa-paw"></i>
            </div>
        </button>

        <button class="category-card" data-category="fruits">
            <div class="category-content">
                <h3>ผักและผลไม้</h3>
                <p>คำศัพท์หมวดอาหารและพืชผัก</p>
            </div>

            <div class="category-icon green">
                <i class="fa-solid fa-apple-whole"></i>
            </div>
        </button>

        <button class="category-card" data-category="body">
            <div class="category-content">
                <h3>อวัยวะในร่างกาย</h3>
                <p>เรียนรู้ส่วนต่าง ๆ ของร่างกาย</p>
            </div>

            <div class="category-icon cyan">
                <i class="fa-solid fa-person"></i>
            </div>
        </button>

    </section>

    <div class="bottom-nav">

        <button class="nav-item" onclick="navigateTo('leaderboard')">
            <i class="fas fa-trophy"></i>
        </button>

        <button class="nav-item active" onclick="navigateTo('home')">
            <i class="fas fa-home"></i>
        </button>

        <button class="nav-item" onclick="navigateTo('profile')">
            <i class="fas fa-user"></i>
        </button>

    </div>

</div>
